<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Damas Correto</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#tabuleiro{
  display:grid;
  grid-template-columns:repeat(8,70px);
  margin-top:20px;
}

.casa{width:70px;height:70px;}
.clara{background:#f0d9b5;}
.escura{background:#b58863;}

.peca{
  width:50px;height:50px;
  border-radius:50%;
  margin:auto;
  margin-top:10px;
}

.branca{background:#fff;}
.preta{background:#000;}
.dama{border:4px solid gold;}
</style>
</head>

<body>

<h2>♟️ Damas Oficial</h2>
<p id="status">Sua vez</p>

<div id="tabuleiro"></div>

<script>

let board=[], turno="branca", selected=null;

function dentro(i,j){
  return i>=0 && i<8 && j>=0 && j<8;
}

function init(){
  let t=document.getElementById("tabuleiro");
  t.innerHTML="";
  board=[];

  for(let i=0;i<8;i++){
    board[i]=[];
    for(let j=0;j<8;j++){

      let c=document.createElement("div");
      c.className="casa "+((i+j)%2?"escura":"clara");
      c.onclick=()=>clickCasa(i,j);

      if((i+j)%2){
        if(i<3) board[i][j]={cor:"preta"};
        else if(i>4) board[i][j]={cor:"branca"};
        else board[i][j]=null;
      }

      t.appendChild(c);
    }
  }

  turno="branca";
  selected=null;
  render();
}

function render(){
  let casas=document.querySelectorAll(".casa");

  casas.forEach((c,idx)=>{
    let i=Math.floor(idx/8), j=idx%8;
    c.innerHTML="";
    let p=board[i][j];

    if(p){
      let el=document.createElement("div");
      el.className="peca "+p.cor+(p.dama?" dama":"");
      c.appendChild(el);
    }
  });
}

function getCapturas(i,j,cor){

  let p=board[i][j];
  if(!p || p.cor!==cor) return [];

  let dirs = p.dama ?
    [[1,1],[1,-1],[-1,1],[-1,-1]] :
    (cor==="branca"?[[-1,1],[-1,-1]]:[[1,1],[1,-1]]);

  let caps=[];

  dirs.forEach(d=>{
    let mi=i+d[0], mj=j+d[1];
    let ni=i+2*d[0], nj=j+2*d[1];

    if(dentro(ni,nj) &&
       board[ni][nj]==null &&
       board[mi][mj] &&
       board[mi][mj].cor!==cor){

      caps.push({si:i,sj:j,di:ni,dj:nj});
    }
  });

  return caps;
}

function existeCaptura(cor){
  for(let i=0;i<8;i++){
    for(let j=0;j<8;j++){
      if(getCapturas(i,j,cor).length>0){
        return true;
      }
    }
  }
  return false;
}

function clickCasa(i,j){

  if(turno!=="branca") return;

  if(board[i][j] && board[i][j].cor==="branca"){
    selected={i,j};
    return;
  }

  if(selected){

    let caps = getCapturas(selected.i,selected.j,"branca");

    let m={si:selected.i,sj:selected.j,di:i,dj:j};

    // 🔥 se tiver captura, só pode capturar
    if(caps.length>0){
      let ok = caps.find(c=>c.di===i && c.dj===j);
      if(!ok) return;
    }else{
      // movimento normal
      if(Math.abs(i-selected.i)!==1 || Math.abs(j-selected.j)!==1) return;
      if(i!==selected.i-1) return;
      if(board[i][j]) return;
    }

    mover(m);

    // 🔁 multi-captura obrigatória
    let novasCaps = getCapturas(i,j,"branca");
    if(novasCaps.length>0){
      selected={i,j};
      render();
      return;
    }

    turno="preta";
    selected=null;
    render();
    setTimeout(bot,500);
  }
}

function mover(m){
  let p=board[m.si][m.sj];
  board[m.di][m.dj]=p;
  board[m.si][m.sj]=null;

  if(Math.abs(m.di-m.si)===2){
    let mi=(m.si+m.di)/2, mj=(m.sj+m.dj)/2;
    board[mi][mj]=null;
  }

  if(p.cor==="branca" && m.di===0) p.dama=true;
  if(p.cor==="preta" && m.di===7) p.dama=true;
}

//////////////// BOT CORRETO //////////////////

function bot(){

  let todasCaps=[];

  for(let i=0;i<8;i++){
    for(let j=0;j<8;j++){

      let caps = getCapturas(i,j,"preta");

      caps.forEach(c=>todasCaps.push(c));
    }
  }

  // 🍽️ captura obrigatória
  if(todasCaps.length>0){

    let m = todasCaps[Math.floor(Math.random()*todasCaps.length)];

    mover(m);
    render();

    // 🔁 continua comendo
    if(getCapturas(m.di,m.dj,"preta").length>0){
      setTimeout(bot,400);
      return;
    }

  }else{

    // movimentos normais
    let moves=[];

    for(let i=0;i<8;i++){
      for(let j=0;j<8;j++){

        let p=board[i][j];
        if(p && p.cor==="preta"){

          let dirs=[[1,1],[1,-1]];

          dirs.forEach(d=>{
            let ni=i+d[0], nj=j+d[1];

            if(dentro(ni,nj) && board[ni][nj]==null){
              moves.push({si:i,sj:j,di:ni,dj:nj});
            }
          });
        }

      }
    }

    if(moves.length===0){
      document.getElementById("status").innerText="🏆 Você venceu!";
      return;
    }

    let m = moves[Math.floor(Math.random()*moves.length)];
    mover(m);
  }

  render();
  turno="branca";
  document.getElementById("status").innerText="Sua vez";
}

////////////////////////////////////////////////

init();

</script>
</body>
</html>
