<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOABE PLAY DAMAS PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>JOABE PLAY DAMAS come mulher boa</h1>
            <div class="score-display" style="justify-content: center; margin-bottom: 15px;">
                <span class="player-score">VOCÊ: <span id="playerScore">0</span></span>
                <span class="ai-score">IA: <span id="aiScore">0</span></span>
            </div>

            <button id="menuToggle" class="control-btn">☰ Menu</button>

            <div id="menuContainer">
                <div class="controls-top" style="justify-content: center;">
                    <button id="undoBtn" class="control-btn">↩ Desfazer</button>
                    <div class="difficulty-selector">
                        <label for="difficulty">Dificuldade:</label>
                        <select id="difficulty" class="control-select">
                            <option value="easy">Fácil</option>
                            <option value="medium">Médio</option>
                            <option value="hard">Difícil</option>
                        </select>
                    </div>
                </div>

                <div class="controls-bottom">
                    <button id="musicToggleBtn" class="control-btn">🔇 Música: OFF</button>
                    <button id="soundToggleBtn" class="control-btn">🔕 Sons: OFF</button>
                </div>

                <div class="drive-music-panel">
                    <h3 style="margin: 0; font-size: 1rem;">🎵 Música do Google Drive</h3>
                    <input type="text" id="driveUrl" placeholder="Cole aqui o link do Google Drive">
                    <button id="loadDriveMusic" class="control-btn">Carregar Música</button>
                </div>
            </div>
        </header>

        <main class="game-main">
            <div class="board-wrapper">
                <div id="board" class="board"></div>
                <div id="particleContainer" class="particle-container"></div>
            </div>
            <div class="game-info">
                <p id="statusText" class="status-text">Sua vez</p>
            </div>
        </main>

        <div id="victoryScreen" class="victory-screen hidden">
            <h2 id="victoryTitle" class="victory-title"></h2>
            <p id="victoryText" class="victory-text"></p>
            <button id="playAgainBtn" class="play-again-btn">Jogar Novamente</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
